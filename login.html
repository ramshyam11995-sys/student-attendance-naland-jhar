<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — ID Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #060a12;
      --surface: #0d1424;
      --border:  #1a2540;
      --accent:  #f59e0b;
      --blue:    #3b82f6;
      --red:     #f87171;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --font:    'Sora', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(245,158,11,.12), transparent),
        repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(245,158,11,.03) 48px),
        repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(245,158,11,.03) 48px);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 40px rgba(245,158,11,.06);
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }

    /* Shield icon */
    .shield {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #92400e, #f59e0b);
      border-radius: 16px;
      display: grid; place-items: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 24px rgba(245,158,11,.3);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem; font-weight: 700;
      margin-bottom: .4rem;
    }

    .sub {
      text-align: center;
      font-size: .82rem; color: var(--muted);
      margin-bottom: 2.2rem;
      font-family: var(--mono);
      letter-spacing: .04em;
    }

    /* Input group */
    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: .73rem; font-weight: 600;
      color: var(--muted);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: .45rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap span.icon {
      position: absolute; left: .9rem; top: 50%;
      transform: translateY(-50%);
      font-size: .95rem; pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1rem .8rem 2.5rem;
      font-family: var(--font); font-size: .95rem;
      color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,.15);
    }

    /* Show/hide password toggle */
    .toggle-pw {
      position: absolute; right: .9rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: .85rem; padding: .2rem;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Login button */
    .btn-login {
      width: 100%; margin-top: .5rem;
      padding: .95rem;
      border: none; border-radius: 10px;
      background: linear-gradient(135deg, #b45309, #f59e0b);
      color: #fff;
      font-family: var(--font); font-size: 1rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: opacity .2s, transform .15s, box-shadow .2s;
    }
    .btn-login:hover:not(:disabled) {
      opacity: .9; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,158,11,.3);
    }
    .btn-login:disabled { opacity: .4; cursor: not-allowed; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* Error alert */
    .alert {
      display: none;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      color: var(--red);
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .82rem;
      margin-top: 1rem;
      animation: fadeIn .25s ease;
    }
    .alert.show { display: block; }

    /* Footer note */
    .note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .75rem; color: var(--muted);
    }

    @keyframes rise   { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin   { to   { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>

<body>
  <div class="card">
    <div class="shield">🛡️</div>
    <h1>Admin Login</h1>
    <p class="sub">RESTRICTED ACCESS · AUTHORISED ONLY</p>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="icon">🔑</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" type="button" id="togglePw" title="Show/hide">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <div class="spinner"></div>
      <span class="btn-text">Sign In →</span>
    </button>

    <div class="alert" id="errAlert"></div>

    <p class="note">🔒 Session expires after 8 hours</p>
  </div>

  <script>
    const API = "http://localhost:5000";

    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const loginBtn   = document.getElementById("loginBtn");
    const errAlert   = document.getElementById("errAlert");
    const togglePw   = document.getElementById("togglePw");

    // Check if already logged in — redirect straight to dashboard
    (async () => {
      try {
        const r = await fetch(`${API}/admin/me`, { credentials: "include" });
        const d = await r.json();
        if (d.authenticated) {
          window.location.href = "dashboard.html";
        }
      } catch {}
    })();

    // Toggle password visibility
    togglePw.addEventListener("click", () => {
      const show = passwordEl.type === "password";
      passwordEl.type = show ? "text" : "password";
      togglePw.textContent = show ? "🙈" : "👁";
    });

    // Submit on Enter
    [usernameEl, passwordEl].forEach(el =>
      el.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); })
    );

    loginBtn.addEventListener("click", doLogin);

    async function doLogin() {
      errAlert.classList.remove("show");
      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      if (!username || !password) {
        showError("Please enter both username and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.classList.add("loading");

      try {
        const res  = await fetch(`${API}/admin/login`, {
          method:      "POST",
          credentials: "include",
          headers:     { "Content-Type": "application/json" },
          body:        JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          // Redirect to dashboard
          window.location.href = "dashboard.html";
        } else {
          showError(data.error || "Login failed. Try again.");
        }
      } catch {
        showError("Cannot reach the server. Is Flask running on port 5000?");
      } finally {
        loginBtn.disabled = false;
        loginBtn.classList.remove("loading");
      }
    }

    function showError(msg) {
      errAlert.textContent = "⚠️  " + msg;
      errAlert.classList.add("show");
      passwordEl.value = "";
      passwordEl.focus();
    }
  </script>
</body>
</html>
